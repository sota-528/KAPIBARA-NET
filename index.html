<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KAPIBARA-NET</title>

<style>

body{
font-family:sans-serif;
background:#111;
color:#0f0;
margin:0;
}

#login{
padding:40px;
text-align:center;
}

input{
padding:10px;
margin:5px;
}

button{
padding:10px 20px;
}

#main{
display:none;
height:100vh;
}

#top{
background:#000;
padding:10px;
}

#container{
display:flex;
height:calc(100vh - 50px);
}

#users{
width:200px;
background:#000;
padding:10px;
}

#chat{
flex:1;
display:flex;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

#send{
display:flex;
}

#send input{
flex:1;
}

</style>

</head>

<body>

<div id="login">

<h1>KAPIBARA-NET</h1>

<input id="id" placeholder="ログインID"><br>
<input id="pw" type="password" placeholder="パスワード"><br>

<button onclick="login()">ログイン</button>

<p id="login_result"></p>

</div>


<div id="main">

<div id="top">
接続ユーザー: <span id="username"></span>
<button onclick="logout()">ログアウト</button>
</div>

<div id="container">

<div id="users">
<h3>ユーザー</h3>
<ul id="user_list"></ul>
</div>

<div id="chat">

<div id="messages"></div>

<div id="send">
<input id="message">
<button onclick="send()">送信</button>
</div>

</div>

</div>

</div>


<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

let myname = ""

function login(){

const id = document.getElementById("id").value
const pw = document.getElementById("pw").value

socket.emit("login",{id,pw})

}

socket.on("login_success",(name)=>{

myname = name

document.getElementById("login").style.display="none"
document.getElementById("main").style.display="block"

document.getElementById("username").innerText=name

})

socket.on("login_failed",()=>{

document.getElementById("login_result").innerText="ログイン失敗"

})

socket.on("user_list",(users)=>{

const ul = document.getElementById("user_list")

ul.innerHTML=""

users.forEach(u=>{
const li = document.createElement("li")
li.textContent = u
ul.appendChild(li)
})

})

socket.on("chat_message",(data)=>{

const div = document.getElementById("messages")

div.innerHTML += "<p><b>"+data.user+"</b>: "+data.message+"</p>"

div.scrollTop = div.scrollHeight

})

socket.on("system_message",(msg)=>{

const div = document.getElementById("messages")

div.innerHTML += "<p><i>"+msg+"</i></p>"

})

function send(){

const input = document.getElementById("message")

socket.emit("chat_message",input.value)

input.value=""

}

function logout(){

location.reload()

}

</script>

</body>
</html>
